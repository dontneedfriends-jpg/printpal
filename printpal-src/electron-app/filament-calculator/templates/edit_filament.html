{% extends "base.html" %}
{% block title %}Редактировать филамент - PrintPAL{% endblock %}
{% block content %}
<h1>Редактировать филамент</h1>
<div class="card">
    <form method="POST" action="{{ url_for('edit_filament', id=filament.id) }}" class="form-grid">
        <div class="form-group">
            <label for="name">Название</label>
            <input type="text" id="name" name="name" value="{{ filament.name }}" required>
        </div>
        <div class="form-group">
            <label for="filament_type">Тип</label>
            <select id="filament_type" name="filament_type" required>
                {% for t in ["PLA", "PLA+", "PETG", "ABS", "TPU", "Nylon", "ASA", "PC", "Другой"] %}
                <option value="{{ t }}" {% if filament.filament_type == t %}selected{% endif %}>{{ t }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="color">Цвет</label>
            <input type="text" id="color" name="color" value="{{ filament.color }}" required>
        </div>
        <div class="form-group">
            <label for="spool_weight_g">Вес катушки (г)</label>
            <input type="number" id="spool_weight_g" name="spool_weight_g" step="1" value="{{ filament.spool_weight_g }}" required>
        </div>
        <div class="form-group">
            <label for="spool_price">Цена катушки (руб)</label>
            <input type="number" id="spool_price" name="spool_price" step="0.01" value="{{ filament.spool_price }}" required>
        </div>
        <div class="form-group form-actions">
            <button type="submit" class="btn btn-primary">Сохранить</button>
            <a href="{{ url_for('filaments') }}" class="btn btn-secondary">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
