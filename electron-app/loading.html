<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #0a0a14;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  color: #d8d8f0;
  overflow: hidden;
  user-select: none;
  -webkit-app-region: drag;
}
.logo {
  font-size: 2.5rem;
  font-weight: 800;
  background: linear-gradient(135deg, #6c8cff, #8b5cf6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 1.5rem;
  letter-spacing: -0.03em;
}
.spinner {
  width: 36px;
  height: 36px;
  border: 3px solid rgba(108,140,255,0.2);
  border-top-color: #6c8cff;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 1rem;
}
@keyframes spin { to { transform: rotate(360deg); } }
.status {
  font-size: 0.9rem;
  color: #7878a0;
}
</style>
</head>
<body>
<div class="logo">PrintPAL</div>
<div class="spinner"></div>
<div class="status">Загрузка...</div>
</body>
</html>
