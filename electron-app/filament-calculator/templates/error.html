{% extends "base.html" %}

{% block title %}{{ code }} — PrintPAL{% endblock %}

{% block content %}
<div class="card" style="text-align:center; padding:3rem 1rem;">
    <h1 style="font-size:4rem; margin-bottom:0.5rem; color:var(--danger);">{{ code }}</h1>
    <p style="font-size:1.25rem; color:var(--text-secondary); margin-bottom:1.5rem;">{{ message }}</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary">{{ _('nav_home') }}</a>
</div>
{% endblock %}
