{% extends "base.html" %}
{% block title %}Редактировать принтер - PrintPAL{% endblock %}
{% block content %}
<h1>Редактировать принтер</h1>
<div class="card">
    <form method="POST" action="{{ url_for('edit_printer', id=printer.id) }}" class="form-grid">
        <div class="form-group">
            <label for="name">Название</label>
            <input type="text" id="name" name="name" value="{{ printer.name }}" required>
        </div>
        <div class="form-group">
            <label for="power_watts">Мощность (Вт)</label>
            <input type="number" id="power_watts" name="power_watts" step="1" value="{{ printer.power_watts }}" required>
        </div>
        <div class="form-group">
            <label for="purchase_price">Цена покупки (руб)</label>
            <input type="number" id="purchase_price" name="purchase_price" step="0.01" value="{{ printer.purchase_price }}" required>
        </div>
        <div class="form-group">
            <label for="depreciation_per_hour">Амортизация (руб/час)</label>
            <input type="number" id="depreciation_per_hour" name="depreciation_per_hour" step="0.01" value="{{ printer.depreciation_per_hour }}" required>
        </div>
        <div class="form-group">
            <label for="ip_address">IP-адрес <span class="optional">(опционально)</span></label>
            <input type="text" id="ip_address" name="ip_address" value="{{ printer.ip_address or '' }}" placeholder="192.168.1.100">
        </div>
        <div class="form-group form-actions">
            <button type="submit" class="btn btn-primary">Сохранить</button>
            <a href="{{ url_for('printers') }}" class="btn btn-secondary">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
