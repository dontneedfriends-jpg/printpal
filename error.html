<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#0a0a14; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; color:#d8d8f0; overflow:hidden; user-select:none; -webkit-app-region:drag; }
.logo { font-size:2rem; font-weight:800; background:linear-gradient(135deg,#6c8cff,#8b5cf6); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:1rem; }
.msg { text-align:center; max-width:400px; color:#7878a0; font-size:0.9rem; line-height:1.6; }
.msg strong { color:#f87171; }
</style>
</head>
<body>
<div class="logo">PrintPAL</div>
<div class="msg">
  <strong>Ошибка запуска</strong><br><br>
  Убедитесь что:<br>
  1. Python установлен (python.org)<br>
  2. При установке отмечена галочка "Add Python to PATH"<br>
  3. Flask установлен: <code>pip install flask</code>
</div>
</body>
</html>
